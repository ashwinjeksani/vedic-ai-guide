# Render Blueprint — deploys the Sanatana app as one web service (free tier).
#
# The build compiles the Vite frontend, copies it into ./public, and installs
# server deps. The server creates the SQLite schema on startup at DB_PATH.
#
# NOTE: free tier has no persistent disk, so the SQLite DB lives on the
# ephemeral filesystem (/tmp) and RESETS on every restart/redeploy — accounts,
# allowlist, and guest counts do not persist. For durable data, switch to
# plan: starter and add a disk (mountPath: /var/data, DB_PATH there).
#
# After first deploy, set the secret env vars in the Render dashboard
# (they are intentionally marked sync:false so they are NOT stored in git).

services:
  - type: web
    name: sanatana
    runtime: node
    plan: free # upgrade to "starter" (~$7/mo) to remove cold-start spin-down
    buildCommand: |
      npm --prefix frontend install && npm --prefix frontend run build
      rm -rf server/../public && mkdir -p public && cp -r frontend/dist/* public/
      npm --prefix server install
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /tmp/sanatana.db   # ephemeral: SQLite resets on restart/redeploy (free tier, no disk)
      - key: PORT
        value: "10000"
      - key: GUEST_DAILY_LIMIT
        value: "10"
      # ----- set these in the dashboard (Environment tab), not in git -----
      - key: RP_ID
        sync: false # e.g. sanatana.yourdomain.com
      - key: ORIGIN
        sync: false # e.g. https://sanatana.yourdomain.com
      - key: RP_NAME
        sync: false # e.g. Sanatana
      - key: SESSION_SECRET
        generateValue: true # Render generates a strong random value for you
      - key: ADMIN_USERNAME
        sync: false # the username you'll register first, to claim admin
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
